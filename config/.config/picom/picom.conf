# Author: 2gab
# Source: https://github.com/
# Keyword: picom, visual effects, personal file, compositor
# Reference: https://wiki.archlinux.org/title/Picom

#################################
#             Shadows           #
#################################

shadow = false;

#################################
#           Fading              #
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

#################################
#   Transparency / Opacity      #
#################################

inactive-opacity = 0.85;
active-opacity = 0.9;
frame-opacity = 0.7;

opacity-rule = [
    # transparent
    "80:class_g *= 'kitty'",
    "80:class_g *= 'Emacs'",

    # opaque (media, produtividade, criação)
    "100:class_g *= 'firefox'",
    "100:class_g *= 'okular'",
    "100:class_g *= 'Spotify'",
    "100:class_g *= 'discord'",
    "100:class_g *= 'thunderbird'",
    "100:class_g *= 'Gimp'",
    "100:class_g *= 'Shotcut'",
    "100:class_g *= 'Ardour'",
    "100:class_g *= 'libreoffice'",
    "100:class_g *= 'obs'",
    "100:class_g *= 'MuseScore'",
    "100:class_g *= 'Inkscape'",
    "100:class_g *= 'i3bar'"
];

#################################
#     Background-Blurring       #
#################################

blur-background = true;
blur-method = "dual_kawase";
blur-strength = 7;
blur-background-exclude = [
    "class_g = 'slop'",
    "class_g = 'i3bar'"
];

#################################
#       General Settings        #
#################################

backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = true;
